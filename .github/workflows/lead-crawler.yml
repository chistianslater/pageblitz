name: Lead Crawler

on:
  schedule:
    # Every Sunday at 06:00 UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no API calls, no DB writes)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run lead crawler
        run: npx tsx scripts/lead-crawler/crawler.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || vars.CRAWLER_DRY_RUN || 'false' }}
